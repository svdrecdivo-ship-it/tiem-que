<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiệm Quẻ Vỉa Hè</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Âm thanh (Ông cần tìm 2 file mp3 bỏ cùng thư mục nhé) -->
    <audio id="sound-shake" src="shake.mp3"></audio>
    <audio id="sound-result" src="victory.mp3"></audio>

    <div class="container">
        <div id="main-screen">
            <h1 class="title">✨ TIỆM QUẺ VỈA HÈ ✨</h1>
            <p class="subtitle">Chạm hũ xăm - Định vận mệnh</p>
            
            <div id="hu-xam" onclick="gieoQue()">
                <img src="https://img.icons8.com/papercut/200/fortune-teller.png" alt="Hũ xăm" id="img-hu">
            </div>
            
            <!-- Khu vực quảng cáo giả lập (Để ông biết chỗ chèn sau này) -->
            <div class="ads-banner">
                <p style="font-size: 10px; color: #888;">Quảng cáo</p>
                <div id="ad-slot-1">Chỗ này chèn mã Google AdSense</div>
            </div>
        </div>

        <div id="result-screen" class="hidden card">
            <h2 id="ten-que"></h2>
            <div class="divider"></div>
            <p id="loi-giai"></p>
            
                <div class="payment-item">
                    <p>Mời trà ZaloPay</p>
                    <img src="zalopay-qr.png" alt="QR ZaloPay">
                </div>
            </div>
            
            <button class="btn-retry" onclick="restyle()">Gieo lại quẻ mới</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
