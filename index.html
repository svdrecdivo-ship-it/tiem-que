<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiệm Quẻ Vỉa Hè - Trần Bảo Nam</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Charm:wght@400;700&family=Patrick+Hand&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <div id="main-screen">
            <h1 class="title">Tiệm Quẻ Vỉa Hè</h1>
            
            <div class="img-container">
                <img src="nguoi-cam-que.png" id="img-hu" alt="Gieo Quẻ" onclick="gieoQue()">
            </div>

            <div class="input-section">
                <input type="text" id="user-name" placeholder="Nhập tên của bạn..." maxlength="20">
                <p class="note">* Tên dùng để tính toán năng lượng quẻ, không lưu lại.</p>
            </div>

            <button class="btn-gieo" onclick="gieoQue()">CHẠM ĐỂ GIEO QUẺ</button>
            
            <div class="system-footer">
                Hệ thống quẻ bói được phát triển bởi Trần Bảo Nam 2026
            </div>
        </div>

        <div id="result-screen" class="hidden">
            <h2 class="result-title">Vận Mệnh Của Bạn</h2>
            <div class="que-card">
                <h1 id="ten-que">...</h1>
                <div class="line"></div>
                <p id="loi-giai"></p>
            </div>
            
            <button class="btn-back" onclick="restyle()">XIN QUẺ KHÁC</button>

            <div class="payment-section">
                <p class="donate-text">Mời thầy ly trà đá giải hạn:</p>
                <img src="zalopay-qr.png" alt="QR Pay" id="qr-zalo">
            </div>
        </div>

        <div id="ads-screen" class="hidden">
            <div class="ads-box">
                <p style="color: #f1c40f; margin-bottom: 10px;">Hết lượt gieo hôm nay!</p>
                <p style="font-size: 0.8rem; margin-bottom: 15px;">Xem quảng cáo bên dưới để nhận thêm lượt:</p>
                
                <div class="ads-container">
                    <script async="async" data-cfasync="false" src="https://pl29416190.profitablecpmratenetwork.com/83dd9a7b5b106b6582fb804a6c412d20/invoke.js"></script>
                    <div id="container-83dd9a7b5b106b6582fb804a6c412d20"></div>
                </div>

                <button class="btn-back" style="margin-top: 15px;" onclick="closeAds()">ĐÓNG</button>
            </div>
        </div>
    </div>

    <audio id="sound-shake" src="shake.mp3"></audio>
    <audio id="sound-result" src="result.mp3"></audio>

    <script src="script.js"></script>
</body>
</html>
