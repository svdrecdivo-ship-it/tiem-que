<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiệm Quẻ Vỉa Hè - Trần Bảo Nam</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Charm:wght@400;700&family=Patrick+Hand&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <div id="main-screen">
            <h1 class="title">Tiệm Quẻ Vỉa Hè</h1>
            
            <div class="img-container">
                <img src="nguoi-cam-que.png" id="img-hu" alt="Gieo Quẻ" onclick="gieoQue()">
            </div>

            <div class="input-section">
                <input type="text" id="user-name" placeholder="Nhập tên để định vận mệnh..." maxlength="20">
                <p class="note">* Tên dùng để tính năng lượng quẻ, không lưu lại.</p>
            </div>

            <button class="btn-gieo" onclick="gieoQue()">CHẠM ĐỂ GIEO QUẺ</button>
            
            <div class="system-footer">
                Hệ thống quẻ bói được phát triển bởi Trần Bảo Nam 2026
            </div>
        </div>

        <div id="result-screen" class="hidden">
            <h2 class="result-title">Vận Mệnh Của Bạn</h2>
            <div class="que-card">
                <h1 id="ten-que">...</h1>
                <div class="line"></div>
                <p id="loi-giai"></p>
            </div>
            
            <button class="btn-back" onclick="restyle()">XIN QUẺ KHÁC</button>

            <div class="payment-section">
                <p class="donate-text">Mời thầy ly trà đá giải hạn:</p>
                <img src="zalopay-qr.png" alt="QR Pay" id="qr-zalo">
            </div>
        </div>
    </div>

    <audio id="sound-shake" src="shake.mp3"></audio>
    <audio id="sound-result" src="result.mp3"></audio>

    <script src="script.js"></script>
</body>
</html>
