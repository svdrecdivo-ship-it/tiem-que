<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiệm Quẻ Vỉa Hè</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <audio id="sound-shake" src="shake.mp3" preload="auto"></audio>
    <audio id="sound-result" src="victory.mp3" preload="auto"></audio>

    <div class="container">
        <div id="main-screen">
            <h1 class="title">✨ TIỆM QUẺ VỈA HÈ ✨</h1>
            <p class="subtitle">Chạm vào hũ xăm để xem vận mệnh</p>
            
            <div id="hu-xam" onclick="gieoQue()">
                <img src="https://img.icons8.com/papercut/200/fortune-teller.png" alt="Hũ xăm" id="img-hu">
            </div>

            <div class="ads-banner">
                <p>Quảng cáo tài trợ</p>
                <div id="ad-slot">Cơ hội nhận lộc phát tài hôm nay!</div>
            </div>
        </div>

        <div id="result-screen" class="hidden card">
            <h2 id="ten-que">ĐANG GIẢI QUẺ...</h2>
            <div class="divider"></div>
            <p id="loi-giai"></p>
            
            <div class="payment-section">
                <p class="donate-text">Thấy đúng thì mời thầy ly trà đá nhé:</p>
                <div class="zalopay-box">
                    <p>Zalo Pay</p>
                    <img src="zalopay-qr.png" alt="Mã QR ZaloPay" id="qr-zalo">
                </div>
            </div>
            
            <button class="btn-retry" onclick="restyle()">Gieo quẻ khác</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
